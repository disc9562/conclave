name: ✨ Feature Request
description: Suggest a new capability or enhancement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This is a feature request (not a bug report).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user pain point — not the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should DreamCoder do? Sketch the UX or API if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Desktop UI
        - Provider / Model
        - MCP
        - Computer Use
        - Terminal
        - Theme / i18n
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
