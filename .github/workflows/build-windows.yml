name: build-windows-x64

# Manual run, or on a v* tag push. Produces an unsigned Windows installer.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create/attach the GitHub Release on tag builds
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # windows-latest ships MSVC + WebView2; we just need the Rust toolchain.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the slow Tauri/Rust compile (keyed to the src-tauri crate).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Root deps are the sidecar runtime (src/ is imported by the sidecar build).
      - name: Install root deps
        run: bun install

      - name: Install desktop deps
        run: bun install
        working-directory: desktop

      # beforeBuildCommand already runs `bun run build && bun run build:sidecars`,
      # so this one step builds the frontend, compiles the sidecar for
      # x86_64-pc-windows-msvc, and bundles the NSIS .exe + .msi installers.
      # The CI config disables updater artifacts so no signing key is needed.
      - name: Build Tauri (Windows installer)
        run: bun run tauri build --config src-tauri/tauri.ci.conf.json
        working-directory: desktop

      - uses: actions/upload-artifact@v4
        with:
          name: conclave-windows-x64
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

      # On v* tag builds, also publish the installers as a GitHub Release so
      # they show up on the Releases page (Actions artifacts don't).
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
